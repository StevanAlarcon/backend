version: '3.8'

services:

  # ──────────────────────────────────────────────────
  # Servicio 1: MongoDB
  # ──────────────────────────────────────────────────
  mongo:
    image: mongo:4.4
    container_name: unidev-mongo
    ports:
      - "27017:27017"          # Expone Mongo para conectarte desde un cliente (ej: MongoDB Compass)
    volumes:
      - datos-mongo:/data/db   # Los datos persisten aunque el contenedor se elimine
    networks:
      - unidev-net
    healthcheck:             # Verifica que MongoDB está listo antes de iniciar la API
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # Servicio 2: API Backend (Node.js + TypeScript)
  # ──────────────────────────────────────────────────
  api:
    build:
      context: .              # Construye desde el Dockerfile en el directorio actual
      dockerfile: Dockerfile
    container_name: unidev-api
    ports:
      - "3000:3000"            # Tu PC:3000 → Contenedor:3000
    environment:
      # La URL de MongoDB usa 'mongo' como host (el nombre del servicio en esta red)
      - DB_CONNECTION=mongodb://mongo:27017/unidev
      - DB_CONNECTION_TEST=mongodb://mongo:27017/unidev_test
      - PORT=3000
      - JWT_KEY=mi-clave-jwt-super-secreta-cambiar-en-produccion
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Bind mount: cambios en ./src se reflejan inmediatamente en el contenedor
      - ./src:/app/src
    depends_on:
      mongo:
        condition: service_healthy  # Espera a que Mongo esté listo (healthcheck)
    networks:
      - unidev-net
    restart: on-failure        # Reinicia automáticamente si la app falla

# ──────────────────────────────────────────────────
# Volúmenes y Redes
# ──────────────────────────────────────────────────
volumes:
  datos-mongo:               # Volumen nombrado para los datos de MongoDB

networks:
  unidev-net:                # Red compartida entre api y mongo
    driver: bridge